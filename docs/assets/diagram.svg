<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 340" width="100%" height="340">
  <defs>
    <style>
      .frame { fill: none; stroke: #d6d9dc; stroke-width: 2; rx: 16; }
      .box { fill: #f8f9fa; stroke: #111213; stroke-width: 2; rx: 8; }
      .text { font-family: 'IBM Plex Sans', sans-serif, Arial; font-size: 16px; fill: #111213; text-anchor: middle; font-weight: bold; }
      .label { font-family: 'IBM Plex Sans', sans-serif, Arial; font-size: 14px; fill: #555; text-anchor: middle; }
      .caption { font-family: 'IBM Plex Sans', sans-serif, Arial; font-size: 13px; fill: #777; }
      .line { stroke: #111213; stroke-width: 2; fill: none; }
      .arrow { fill: #111213; }
      .dashed { stroke-dasharray: 6 6; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
  </defs>

  <rect x="35" y="75" width="220" height="150" class="frame" />
  <text x="55" y="100" class="caption">Browser</text>

  <rect x="50" y="120" width="190" height="60" class="box" />
  <text x="145" y="155" class="text">FrontendMCP</text>
  <text x="145" y="205" class="label">(Client-side MCP server)</text>

  <rect x="350" y="120" width="190" height="60" class="box" />
  <text x="445" y="155" class="text">Relay Server</text>
  <text x="445" y="205" class="label">(HTTP ↔ WS bridge)</text>

  <rect x="650" y="120" width="190" height="60" class="box" />
  <text x="745" y="155" class="text">MCP Client</text>
  <text x="745" y="205" class="label">(Backend / LLM)</text>

  <line x1="640" y1="135" x2="550" y2="135" class="line" marker-end="url(#arrowhead)" />
  <text x="595" y="116" class="label">HTTP request</text>

  <line x1="340" y1="135" x2="250" y2="135" class="line dashed" marker-end="url(#arrowhead)" />
  <text x="295" y="116" class="label">WebSocket message</text>

  <line x1="240" y1="165" x2="340" y2="165" class="line dashed" marker-end="url(#arrowhead)" />
  <text x="290" y="188" class="label">WebSocket reply</text>

  <line x1="540" y1="165" x2="640" y2="165" class="line" marker-end="url(#arrowhead)" />
  <text x="590" y="188" class="label">HTTP response</text>
</svg>
